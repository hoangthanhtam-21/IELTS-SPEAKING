<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Speaking Simulator - Practice Mode Updated</title>
    <script src="questions.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; --success: #27ae60; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--primary); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        h1, h2 { text-align: center; margin-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #34495e; transform: translateY(-2px); }
        .btn-back { background: #bdc3c7; color: var(--primary); margin-bottom: 20px; }
        .test-area { display: none; }
        .timer { font-size: 2.5rem; text-align: center; color: var(--accent); margin: 20px 0; font-family: monospace; }
        .status-box { text-align: center; padding: 15px; background: #eee; border-radius: 8px; margin-bottom: 20px; min-height: 50px; }
        .question-card { background: #fff; border: 2px dashed #bdc3c7; padding: 20px; text-align: center; margin-bottom: 20px; border-radius: 10px; font-size: 1.2rem; }
        .hidden { display: none !important; }
        .feedback-list { background: #fff3cd; padding: 20px; border-radius: 8px; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>

<div class="container">
    <button id="global-back-btn" class="btn-back hidden" onclick="goBack()">← Back</button>

    <div id="main-menu">
        <h1>IELTS Speaking Simulator</h1>
        <div class="menu-grid">
            <button class="btn-primary full-width" onclick="showPracticeMenu()">PRACTICE MODE</button>
            <button class="btn-primary full-width" onclick="startMode('fulltest')">FULL TEST MODE</button>
        </div>
    </div>

    <div id="practice-menu" class="hidden">
        <h2>Choose a Part to Practice</h2>
        <div class="menu-grid">
            <button class="btn-primary" onclick="startPracticePart(1)">Part 1</button>
            <button class="btn-primary" onclick="startPracticePart(2)">Part 2</button>
            <button class="btn-primary" onclick="startPracticePart(3)">Part 3</button>
        </div>
    </div>

    <div id="test-area" class="test-area">
        <h2 id="part-title">PART 1</h2>
        <div class="timer" id="timer">00:00</div>
        
        <div class="status-box" id="status-msg">Ready to start?</div>
        
        <div id="question-container" class="question-card hidden"></div>

        <div style="text-align: center; display: flex; justify-content: center; gap: 10px;">
            <button id="action-btn" class="btn-primary" style="background: var(--success);" onclick="handleAction()">START SESSION</button>
            <button id="next-q-btn" class="btn-primary hidden" onclick="nextQuestion()">Next Question →</button>
        </div>

        <div id="feedback-section" class="hidden">
            <h3>Examiner's Assessment</h3>
            <div id="feedback-content" class="feedback-list"></div>
        </div>
    </div>
</div>

<script>
    let currentMode = ''; 
    let currentPart = 0;
    let questionsPool = [];
    let currentQIndex = 0;
    let isRecording = false;

    // Cấu hình giọng đọc
    const synth = window.speechSynthesis;

    function showPracticeMenu() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('practice-menu').classList.remove('hidden');
        document.getElementById('global-back-btn').classList.remove('hidden');
    }

    function goBack() {
        location.reload(); // Cách đơn giản nhất để reset trạng thái
    }

    function startMode(mode) {
        currentMode = mode;
        if(mode === 'fulltest') {
            currentPart = 1;
            startSession();
        }
    }

    function startPracticePart(part) {
        currentMode = 'practice';
        currentPart = part;
        document.getElementById('practice-menu').classList.add('hidden');
        startSession();
    }

    function startSession() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('test-area').style.display = 'block';
        document.getElementById('global-back-btn').classList.remove('hidden');
        document.getElementById('part-title').innerText = "PART " + currentPart;
        
        prepareQuestions();
    }

    function prepareQuestions() {
        if(currentPart === 1) {
            // [cite: 4-13] Bốc 4 câu từ 4 topics
            questionsPool = ieltsData.part1.map(t => t.questions[Math.floor(Math.random() * t.questions.length)]);
        } else if(currentPart === 2) {
            // [cite: 33-55] Bốc 1 topic ngẫu nhiên
            let t = ieltsData.part2[Math.floor(Math.random() * ieltsData.part2.length)];
            questionsPool = [t.content];
        } else {
            // [cite: 79-98] Bốc 3 câu ngẫu nhiên từ 1 topic Part 3
            let topicObj = ieltsData.part3[Math.floor(Math.random() * ieltsData.part3.length)];
            questionsPool = [...topicObj.questions].sort(() => 0.5 - Math.random()).slice(0, 3);
        }
    }

    function handleAction() {
        const btn = document.getElementById('action-btn');
        
        if (currentPart === 2) {
            startPart2Flow();
        } else {
            startAudioQuestionFlow();
        }
        btn.classList.add('hidden');
    }

    // Luồng Part 1 & 3: Đọc -> Trả lời -> Next
    function startAudioQuestionFlow() {
        if(currentQIndex < questionsPool.length) {
            const q = questionsPool[currentQIndex];
            document.getElementById('question-container').classList.add('hidden'); // Đảm bảo ẩn câu hỏi
            document.getElementById('status-msg').innerText = "Listen carefully...";
            
            speak(q, () => {
                document.getElementById('status-msg').innerText = "Speaking now...";
                document.getElementById('next-q-btn').classList.remove('hidden');
                startTimer(45); // Mỗi câu part 1/3 cho tối đa 45s
            });
        }
    }

    function nextQuestion() {
        currentQIndex++;
        if(currentQIndex < questionsPool.length) {
            document.getElementById('next-q-btn').classList.add('hidden');
            startAudioQuestionFlow();
        } else {
            finishPart();
        }
    }

    // Luồng Part 2: Hiện đề -> Chuẩn bị -> Nói 
    function startPart2Flow() {
        const display = document.getElementById('question-container');
        display.classList.remove('hidden');
        display.innerText = questionsPool[0];
        
        document.getElementById('status-msg').innerText = "PREPARATION TIME (1 MIN)";
        startTimer(60, () => {
            alert("Time's up! Start speaking for 2 minutes.");
            document.getElementById('status-msg').innerText = "SPEAKING TIME (2 MINS)";
            startTimer(120, finishPart);
        });
    }

    function speak(text, callback) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 0.9;
        utter.onend = callback;
        synth.speak(utter);
    }

    function startTimer(seconds, callback) {
        let timeLeft = seconds;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerEl.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if(timeLeft <= 0) {
                clearInterval(interval);
                if(callback) callback();
            }
            timeLeft--;
        }, 1000);
    }

    function finishPart() {
        document.getElementById('next-q-btn').classList.add('hidden');
        document.getElementById('status-msg').innerText = "Part Completed.";
        document.getElementById('feedback-section').classList.remove('hidden');
        
        // Mock Feedback khó tính
        document.getElementById('feedback-content').innerHTML = `
            <p><strong>Examiner's Note:</strong> Your response was adequate but lacked idiomatic expressions. 
            In Part ${currentPart}, you should focus more on extending your answers without repetitive fillers.</p>
            <p><strong>Estimated Band: 5.5 - 6.0</strong></p>
        `;
    }
</script>

</body>
</html>
