<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Speaking Simulator - THPT Nguyễn Khuyến</title>
    <script src="questions.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); line-height: 1.6; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--primary); }
        .menu-btns { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .test-area { display: none; margin-top: 30px; }
        .timer { font-size: 2rem; font-weight: bold; color: var(--accent); text-align: center; margin: 20px 0; }
        .question-box { background: #ebf2f7; padding: 20px; border-left: 5px solid var(--primary); margin-bottom: 20px; min-height: 100px; }
        .status { font-style: italic; color: #666; text-align: center; }
        .feedback { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; margin-top: 20px; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>IELTS SPEAKING SIMULATOR</h1>
    <div id="main-menu">
        <p style="text-align:center">Welcome to the professional IELTS mock test system.</p>
        <div class="menu-btns">
            <button class="btn-main" onclick="startMode('practice')">PRACTICE MODE</button>
            <button class="btn-main" onclick="startMode('fulltest')">FULL TEST MODE</button>
        </div>
    </div>

    <div id="test-area" class="test-area">
        <h2 id="current-part-title">PART 1</h2>
        <div class="status" id="status-msg">Click 'Start Recording' to begin</div>
        <div class="timer" id="timer">00:00</div>
        <div class="question-box" id="question-display"></div>
        
        <div style="text-align: center;">
            <button id="record-btn" class="btn-main" style="background: #27ae60;">START RECORDING</button>
            <button id="next-btn" class="btn-main hidden" style="background: #2980b9;">NEXT STEP</button>
        </div>

        <div id="feedback-area" class="hidden">
            <h3>Examiner's Feedback</h3>
            <div class="feedback" id="feedback-content"></div>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let currentStep = 0; // For Full Test: 0=P1, 1=P2, 2=P3
    let selectedPart2Topic = '';
    let mediaRecorder;
    let audioChunks = [];

    const display = document.getElementById('question-display');
    const statusMsg = document.getElementById('status-msg');
    const timerDisplay = document.getElementById('timer');
    const nextBtn = document.getElementById('next-btn');

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('test-area').style.display = 'block';
        
        if(mode === 'practice') {
            setupPractice();
        } else {
            setupFullTest();
        }
    }

    // --- Logic Pick Questions ---
    function setupPractice() {
        // Simple example: Start with a random part
        const rand = Math.floor(Math.random() * 3) + 1;
        loadPart(rand);
    }

    function setupFullTest() {
        currentStep = 1;
        loadPart(1);
    }

    function loadPart(partNum) {
        document.getElementById('current-part-title').innerText = `PART ${partNum}`;
        display.innerHTML = '';
        nextBtn.classList.add('hidden');
        
        if(partNum === 1) {
            // Part 1: Pick 4 random questions from 4 topics [cite: 4-13]
            let selected = ieltsData.part1.map(topic => {
                return topic.questions[Math.floor(Math.random() * topic.questions.length)];
            });
            display.innerHTML = `<ul>${selected.map(q => `<li>${q}</li>`).join('')}</ul>`;
        } 
        else if(partNum === 2) {
            // Part 2: Random topic [cite: 33, 40, 57, 73]
            const topicObj = ieltsData.part2[Math.floor(Math.random() * ieltsData.part2.length)];
            selectedPart2Topic = topicObj.topic;
            display.innerText = topicObj.content;
            handlePart2Timing();
        }
        else if(partNum === 3) {
            // Part 3: 3 questions from P2 topic (Full test) or random (Practice) [cite: 79-98]
            let topicName = (currentMode === 'fulltest') ? selectedPart2Topic : ieltsData.part3[Math.floor(Math.random()*4)].topic;
            let topicObj = ieltsData.part3.find(t => t.topic === topicName) || ieltsData.part3[0];
            let shuffled = [...topicObj.questions].sort(() => 0.5 - Math.random()).slice(0, 3);
            display.innerHTML = `<strong>Topic: ${topicName}</strong><ul>${shuffled.map(q => `<li>${q}</li>`).join('')}</ul>`;
        }
    }

    // --- Part 2 Timing Logic ---
    function handlePart2Timing() {
        statusMsg.innerText = "PREPARATION TIME: 1 MINUTE";
        startTimer(60, () => {
            alert("Preparation time is up! Now you have 2 minutes to speak.");
            statusMsg.innerText = "SPEAKING TIME: 2 MINUTES";
            startTimer(120, () => {
                statusMsg.innerText = "Time's up!";
                showFeedback(2);
            });
        });
    }

    function startTimer(seconds, callback) {
        let timeLeft = seconds;
        const interval = setInterval(() => {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if(timeLeft <= 0) {
                clearInterval(interval);
                callback();
            }
            timeLeft--;
        }, 1000);
    }

    // --- Strict Examiner Feedback ---
    function showFeedback(part) {
        const criteria = ["Fluency", "Lexical Resource", "Grammar", "Pronunciation"];
        const scores = [5.5, 6.0, 5.0, 6.0]; // Simulated scores
        const feedbackArea = document.getElementById('feedback-area');
        const content = document.getElementById('feedback-content');
        
        feedbackArea.classList.remove('hidden');
        let html = `<p><strong>Estimated Band: ${scores.reduce((a,b)=>a+b,0)/4}</strong></p><ul>`;
        
        criteria.forEach(c => {
            html += `<li><strong>${c}:</strong> You showed some hesitation. Needs more complex structures.</li>`;
        });
        html += `</ul><p><em>Note: As a strict examiner, I recommend focusing on linking words and avoiding repetition.</em></p>`;
        
        content.innerHTML = html;
        nextBtn.classList.remove('hidden');
        
        nextBtn.onclick = () => {
            feedbackArea.classList.add('hidden');
            if(currentMode === 'fulltest' && currentStep < 3) {
                currentStep++;
                loadPart(currentStep);
            } else {
                alert("Session Completed!");
                location.reload();
            }
        };
    }

    // --- Audio Recording ---
    document.getElementById('record-btn').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        statusMsg.innerText = "Recording... Speak now.";
        document.getElementById('record-btn').disabled = true;
        
        // Auto stop for Part 1 & 3 after 2 mins if user doesn't stop
        if(currentStep !== 2) {
             setTimeout(() => {
                if(mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    showFeedback(currentStep || 1);
                }
             }, 120000);
        }
    };
</script>
</body>
</html>
